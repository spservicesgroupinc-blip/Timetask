<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <title>TruChoice API</title>
    <style>
      body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        padding: 40px; 
        background: #f8fafc;
        color: #334155;
        text-align: center;
      }
      .card {
        background: white;
        padding: 30px;
        border-radius: 12px;

      }

      .status { 
        display: inline-block;
        padding: 6px 12px;
        background: #dcfce7;
        color: #166534;
        border-radius: 20px;
        font-weight: bold;
        font-size: 14px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>TruChoice Task API</h1>
      <p>The backend is running correctly.</p>
      <p>This script serves JSON data to the React application.</p>

</html>
